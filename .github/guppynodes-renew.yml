name: GuppyNodes Auto Renew

on:
  schedule:
   - cron: "0 2 */7 * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: guppynodes-auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 从私有仓库仅拉取 guppynodes.py
        uses: actions/checkout@v6
        with:
          repository: vipcd/zhuanshu-jiaoben
          ref: main
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-script
          sparse-checkout: |
            guppynodes.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖与 Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: 运行 guppynodes.py
        env:
          GUPPY_EMAIL: ${{ secrets.GUPPY_EMAIL }}
          GUPPY_PASSWORD: ${{ secrets.GUPPY_PASSWORD }}
          GUPPY_SERVICE_URL: https://billing.guppynodes.com/services/308
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SCREENSHOT_DIR: screenshots
        run: python private-script/guppynodes.py

      - name: 上传运行截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guppynodes-screenshot-${{ github.run_id }}
          path: screenshots/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: 删除本工作流的旧运行记录，仅保留当前记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        shell: bash
        run: |
          set -euo pipefail
          workflow_file="${WORKFLOW_REF#*/.github/workflows/}"
          workflow_file="${workflow_file%@*}"

          page=1
          while :; do
            ids="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/workflows/${workflow_file}/runs?per_page=100&page=${page}" \
              --jq ".workflow_runs[] | select((.id | tostring) != \"${CURRENT_RUN_ID}\" and .status == \"completed\") | .id")"

            [ -z "$ids" ] && break
            while IFS= read -r run_id; do
              [ -n "$run_id" ] || continue
              echo "Deleting completed workflow run: $run_id"
              gh api --method DELETE "/repos/${REPOSITORY}/actions/runs/${run_id}"
            done <<< "$ids"
            page=$((page + 1))
          done
